name: 🤖 Auto Build & Self-Heal

on:
  push:
    branches: [master, main]
    paths:
      - 'android/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.11.1

      - name: Build Debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace
          echo "=== BUILD OUTPUT ==="
          ls -laR app/build/outputs/ 2>/dev/null || echo "No outputs dir"
          echo "=== ALL APK FILES ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          echo "=== BUILD DIR ==="
          ls -la app/build/ 2>/dev/null || echo "No build dir"

      - name: Find APK
        id: apk
        run: |
          echo "Searching for APK files..."
          find . -name "*.apk" -type f 2>/dev/null
          APK=$(find android -path "*/build/outputs/apk*" -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            APK=$(find . -name "*.apk" -type f | head -1)
          fi
          echo "APK found: $APK"
          echo "path=$APK" >> $GITHUB_OUTPUT
          ls -la "$APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CryptoQuantAI
          path: ${{ steps.apk.outputs.path }}
