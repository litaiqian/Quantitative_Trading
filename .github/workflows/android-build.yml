name: 🤖 Auto Build & Self-Heal

on:
  push:
    branches: [master, main]
    paths:
      - 'android/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.11.1

      - name: Build Debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log
          echo "=== LAST 100 LINES ===" 
          tail -100 /tmp/build.log

      - name: Find APK
        id: apk
        run: |
          APK=$(find android -name "*.apk" | head -1)
          echo "APK found: $APK"
          echo "path=$APK" >> $GITHUB_OUTPUT
          ls -la "$APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CryptoQuantAI
          path: ${{ steps.apk.outputs.path }}
